<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Robot HUD</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.15.2/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.2/nipplejs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.185.0/three.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; touch-action: none; font-family: sans-serif; }
        #cam-stream { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.9; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; padding: 15px 25px; pointer-events: auto; }
        
        #car-3d { width: 110px; height: 110px; border-radius: 50%; background: rgba(0, 15, 30, 0.7); border: 2px solid rgba(14, 165, 233, 0.4); box-shadow: 0 0 15px rgba(14, 165, 233, 0.3); display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .controls-group { display: flex; gap: 15px; align-items: center; }

        #boost-btn { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #0ea5e9; background: radial-gradient(circle, rgba(14,165,233,0.2) 0%, rgba(0,0,0,0.6) 100%); cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 0 12px rgba(14, 165, 233, 0.4); }
        #boost-btn::after { content: '🍃'; font-size: 24px; transition: transform 0.3s ease; }
        #boost-btn.boost { border-color: #ef4444; background: radial-gradient(circle, rgba(239,68,68,0.4) 0%, rgba(40,0,0,0.8) 100%); box-shadow: 0 0 30px rgba(239, 68, 68, 0.9), inset 0 0 12px rgba(239, 68, 68, 0.6); animation: shake 0.2s infinite alternate; }
        #boost-btn.boost::after { content: '🔥'; transform: scale(1.2); filter: drop-shadow(0 0 8px #ef4444); }

        /* Flashlight Container & Inline Slider Extension */
        #flash-container { display: flex; align-items: center; background: rgba(20, 20, 20, 0.85); border: 2px solid #333; border-radius: 30px; padding: 5px; height: 55px; box-sizing: border-box; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 55px; overflow: hidden; backdrop-filter: blur(8px); }
        #flash-container.on { border-color: #eab308; box-shadow: 0 0 20px rgba(234, 179, 8, 0.6); }
        #flash-container.expanded { width: 210px; border-color: #38bdf8; }
        
        #flash-icon-wrap { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        #flash-img { width: 34px; height: 34px; object-fit: contain; filter: brightness(0.2) grayscale(1); transition: filter 0.3s ease; user-select: none; -webkit-user-drag: none; }
        #flash-container.on #flash-img { filter: brightness(1.3) drop-shadow(0 0 6px #eab308); }

        #brightness-slider { width: 130px; margin-left: 12px; opacity: 0; transition: opacity 0.3s ease; cursor: pointer; pointer-events: none; accent-color: #38bdf8; }
        #flash-container.expanded #brightness-slider { opacity: 1; pointer-events: auto; }

        .bottom-bar { display: flex; justify-content: space-between; padding: 25px 35px; pointer-events: auto; }
        .joystick-zone { width: 150px; height: 150px; position: relative; background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; }

        @keyframes shake { from { transform: translate(0, 0); } to { transform: translate(1px, -1px); } }

        @media (max-width: 768px) {
            .top-bar { padding: 10px 15px; }
            .bottom-bar { padding: 15px 20px; position: absolute; bottom: 10px; width: 100%; box-sizing: border-box; }
            #car-3d { width: 85px; height: 85px; }
            .joystick-zone { width: 120px; height: 120px; }
            #flash-container { height: 50px; width: 50px; }
            #flash-container.expanded { width: 175px; }
            #flash-img { width: 30px; height: 30px; }
            #boost-btn { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <!-- Separate Communication Layer: Live Video Stream -->
    <img id="cam-stream" src="http://192.168.1.100:81/stream" alt="Awaiting Video Stream..." />

    <!-- UI Overlay Layer -->
    <div id="hud">
        <div class="top-bar">
            <div id="car-3d"></div>
            
            <div class="controls-group">
                <!-- Flash Button with Updated Image Source -->
                <div id="flash-container">
                    <div id="flash-icon-wrap">
                        <img id="flash-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3FN8oez28BlCPvlvYNL3X4LSj12Onvr5xoEtD6c0VKw&s=10" alt="Flash" crossorigin="anonymous">
                    </div>
                    <input type="range" id="brightness-slider" min="10" max="255" value="255">
                </div>
                
                <!-- Boost / Eco Dynamic Button -->
                <div id="boost-btn"></div>
            </div>
        </div>

        <div class="bottom-bar">
            <div id="zone-left" class="joystick-zone"></div>
            <div id="zone-right" class="joystick-zone"></div>
        </div>
    </div>

    <script>
        // --- Separate Communication Layer (MQTT for Control) ---
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const driveTopic = 'myrobot/drive';
        const servoTopic = 'myrobot/servo';
        const stateTopic = 'myrobot/state';

        // --- Boost / Eco Button Behavior ---
        let isBoost = false;
        const boostBtn = document.getElementById('boost-btn');
        boostBtn.addEventListener('pointerdown', () => {
            isBoost = !isBoost;
            boostBtn.classList.toggle('boost', isBoost);
            client.publish(stateTopic, JSON.stringify({ mode: isBoost ? 'BOOST' : 'ECO' }));
        });

        // --- Flashlight Touch & Hold (1 sec) Slider Expansion Logic ---
        const flashContainer = document.getElementById('flash-container');
        const brightnessSlider = document.getElementById('brightness-slider');
        let isFlashOn = false;
        let isFlashExpanded = false;
        let flashHoldTimer;

        flashContainer.addEventListener('pointerdown', (e) => {
            if(e.target === brightnessSlider) return;
            flashHoldTimer = setTimeout(() => {
                isFlashExpanded = true;
                flashContainer.classList.add('expanded');
            }, 1000);
        });

        flashContainer.addEventListener('pointerup', (e) => {
            if(e.target === brightnessSlider) return;
            clearTimeout(flashHoldTimer);
            if (!isFlashExpanded) {
                isFlashOn = !isFlashOn;
                flashContainer.classList.toggle('on', isFlashOn);
                client.publish(stateTopic, JSON.stringify({ flash: isFlashOn ? brightnessSlider.value : 0 }));
            }
        });

        flashContainer.addEventListener('pointerleave', () => clearTimeout(flashHoldTimer));

        document.addEventListener('pointerdown', (e) => {
            if(isFlashExpanded && !flashContainer.contains(e.target)) {
                isFlashExpanded = false;
                flashContainer.classList.remove('expanded');
            }
        });

        brightnessSlider.addEventListener('input', (e) => {
            if(isFlashOn) {
                client.publish(stateTopic, JSON.stringify({ flash: e.target.value }));
            }
        });

        // --- Independent Multi-Touch Joysticks ---
        const joyLeft = nipplejs.create({ zone: document.getElementById('zone-left'), mode: 'static', position: { left: '50%', top: '50%' }, color: '#0ea5e9' });
        const joyRight = nipplejs.create({ zone: document.getElementById('zone-right'), mode: 'static', position: { left: '50%', top: '50%' }, color: '#d946ef' });

        joyLeft.on('move', (evt, data) => {
            if (data.direction) {
                let pwr = Math.round(data.force * (isBoost ? 100 : 50)); 
                client.publish(driveTopic, JSON.stringify({ x: Math.round(data.vector.x * 100), y: Math.round(data.vector.y * 100), pwr: pwr }));
            }
        });
        joyLeft.on('end', () => client.publish(driveTopic, JSON.stringify({ x: 0, y: 0, pwr: 0 })));

        joyRight.on('move', (evt, data) => {
            client.publish(servoTopic, JSON.stringify({ pan: Math.round(data.vector.x * 90), tilt: Math.round(data.vector.y * 90) }));
        });

        // --- 3D Car Diagram (Compact Hatchback Replica with Front Camera) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        
        const container3D = document.getElementById('car-3d');
        renderer.setSize(container3D.clientWidth, container3D.clientHeight);
        container3D.appendChild(renderer.domElement);

        const carGroup = new THREE.Group();

        // 3-Cylinder Hatchback Chassis Body
        const chassisGeo = new THREE.BoxGeometry(1.1, 0.45, 2.0);
        const chassisMat = new THREE.MeshBasicMaterial({ color: 0x0ea5e9, wireframe: true, transparent: true, opacity: 0.85 });
        const chassis = new THREE.Mesh(chassisGeo, chassisMat);
        carGroup.add(chassis);

        // Front Camera Module Indicator
        const camGeo = new THREE.BoxGeometry(0.25, 0.25, 0.35);
        const camMat = new THREE.MeshBasicMaterial({ color: 0xef4444, wireframe: true });
        const frontCam = new THREE.Mesh(camGeo, camMat);
        frontCam.position.set(0, 0.35, -1.05);
        carGroup.add(frontCam);

        // 4 Wheels
        const wheelGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.12, 12);
        const wheelMat = new THREE.MeshBasicMaterial({ color: 0x94a3b8, wireframe: true });
        const wheelPositions = [ [-0.6, -0.2, -0.7], [0.6, -0.2, -0.7], [-0.6, -0.2, 0.7], [0.6, -0.2, 0.7] ];
        wheelPositions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(...pos);
            carGroup.add(wheel);
        });

        scene.add(carGroup);
        camera.position.set(2.2, 2.2, 2.2);
        camera.lookAt(0, 0, 0);

        function animate3D() {
            requestAnimationFrame(animate3D);
            carGroup.rotation.y += 0.006;
            renderer.render(scene, camera);
        }
        animate3D();

        window.addEventListener('resize', () => {
            const w = container3D.clientWidth;
            renderer.setSize(w, w);
        });
    </script>
</body>
</html>
